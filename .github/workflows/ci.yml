name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14.5"
  UV_VERSION: "0.11.29"

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync quality dependencies
        run: uv sync --locked --no-default-groups --group lint --group test --group typecheck

      - name: Ruff check
        run: uv run --no-sync ruff check .

      - name: Ruff format check
        run: uv run --no-sync ruff format --check .

      - name: Mypy
        run: uv run --no-sync mypy src tests

      - name: Pyright
        run: uv run --no-sync pyright

      - name: Import boundary contracts
        run: uv run --no-sync lint-imports

      - name: Code-quality tests
        run: uv run --no-sync pytest tests/code_quality -q -n0 --no-cov

  behavior-tests:
    name: behavior-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Sync test dependencies
        run: uv sync --locked --no-default-groups --group test

      - name: Run behavioral coverage tests
        run: >-
          uv run --no-sync pytest tests
          --ignore=tests/code_quality
          -n 2
          --dist=worksteal
          --cov=warhammer40k_core
          --cov-report=term-missing
          --cov-fail-under=85
          --durations=100
          --durations-min=0.1
          --junitxml=reports/behavior-tests.xml

      - name: Upload behavioral test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: behavior-test-report
          path: reports/behavior-tests.xml
          if-no-files-found: error
