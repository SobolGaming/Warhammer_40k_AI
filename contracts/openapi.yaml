{
  "openapi": "3.1.0",
  "info": {
    "title": "Warhammer 40,000 CORE V2 Adapter Contract",
    "version": "3.0.0",
    "description": "Authenticated Phase 18G/18H session protocol with the Phase 18I typed interaction contract, server-owned role bindings, opaque role-bound cursors, deterministic pagination, and explicit projection resynchronization."
  },
  "servers": [{"url": "http://127.0.0.1:8000"}],
  "security": [{"bearerAuth": []}],
  "paths": {
    "/rules-catalog": {
      "get": {
        "operationId": "getRulesCatalog",
        "responses": {
          "200": {
            "description": "Source-hashed rules catalog projection for an authorized principal.",
            "content": {"application/json": {"schema": {"$ref": "./schemas/rules-catalog.schema.json"}}}
          },
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/games": {
      "post": {
        "deprecated": true,
        "operationId": "createLegacyGame",
        "requestBody": {
          "required": true,
          "content": {"application/json": {"schema": {"$ref": "./schemas/create-session.schema.json"}}}
        },
        "responses": {
          "201": {"$ref": "#/components/responses/LifecycleStatus"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/games/{game_id}/advance": {
      "post": {
        "deprecated": true,
        "operationId": "advanceLegacyGame",
        "parameters": [{"$ref": "#/components/parameters/GameId"}],
        "responses": {
          "200": {"$ref": "#/components/responses/LifecycleStatus"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/games/{game_id}/view": {
      "get": {
        "deprecated": true,
        "operationId": "getLegacyGameProjection",
        "parameters": [{"$ref": "#/components/parameters/GameId"}],
        "responses": {
          "200": {"$ref": "#/components/responses/SessionProjection"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/games/{game_id}/events": {
      "get": {
        "deprecated": true,
        "operationId": "getLegacyGameEvents",
        "parameters": [
          {"$ref": "#/components/parameters/GameId"},
          {"$ref": "#/components/parameters/EventCursor"},
          {"$ref": "#/components/parameters/EventPageLimit"}
        ],
        "responses": {
          "200": {"$ref": "#/components/responses/EventDelta"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/games/{game_id}/replay": {
      "get": {
        "deprecated": true,
        "operationId": "exportLegacyGameReplay",
        "parameters": [{"$ref": "#/components/parameters/GameId"}],
        "responses": {
          "200": {
            "description": "Deterministic replay artifact for an authorized replay role.",
            "content": {"application/json": {"schema": {"$ref": "./schemas/replay-metadata.schema.json"}}}
          },
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/games/{game_id}/support-profile": {
      "get": {
        "deprecated": true,
        "operationId": "getLegacyGameSupportProfile",
        "parameters": [{"$ref": "#/components/parameters/GameId"}],
        "responses": {
          "200": {
            "description": "Support profile for a role authorized to inspect live support metadata.",
            "content": {"application/json": {"schema": {"$ref": "./schemas/support-profile.schema.json"}}}
          },
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/games/{game_id}/decisions/{request_id}/option": {
      "post": {
        "deprecated": true,
        "operationId": "submitLegacyFiniteDecision",
        "parameters": [
          {"$ref": "#/components/parameters/GameId"},
          {"$ref": "#/components/parameters/RequestId"}
        ],
        "requestBody": {
          "required": true,
          "content": {"application/json": {"schema": {"$ref": "./schemas/finite-submission.schema.json"}}}
        },
        "responses": {
          "200": {"$ref": "#/components/responses/LifecycleStatus"},
          "422": {"$ref": "#/components/responses/LifecycleStatus"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/games/{game_id}/decisions/{request_id}/payload": {
      "post": {
        "deprecated": true,
        "operationId": "submitLegacyParameterizedDecision",
        "parameters": [
          {"$ref": "#/components/parameters/GameId"},
          {"$ref": "#/components/parameters/RequestId"}
        ],
        "requestBody": {
          "required": true,
          "content": {"application/json": {"schema": {"$ref": "./schemas/parameterized-submission.schema.json"}}}
        },
        "responses": {
          "200": {"$ref": "#/components/responses/LifecycleStatus"},
          "422": {"$ref": "#/components/responses/LifecycleStatus"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/sessions": {
      "post": {
        "operationId": "createAuthoritativeSession",
        "requestBody": {
          "required": true,
          "content": {"application/json": {"schema": {"$ref": "./schemas/session-create.schema.json"}}}
        },
        "responses": {
          "201": {"$ref": "#/components/responses/SessionMetadata"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/sessions/{session_id}": {
      "get": {
        "operationId": "getSessionMetadata",
        "parameters": [{"$ref": "#/components/parameters/SessionId"}],
        "responses": {
          "200": {"$ref": "#/components/responses/SessionMetadata"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/sessions/{session_id}/commands": {
      "post": {
        "operationId": "executeSessionCommand",
        "parameters": [{"$ref": "#/components/parameters/SessionId"}],
        "requestBody": {
          "required": true,
          "content": {"application/json": {"schema": {"$ref": "./schemas/session-command-envelope.schema.json"}}}
        },
        "responses": {
          "200": {"$ref": "#/components/responses/SessionCommandOutcome"},
          "400": {"$ref": "#/components/responses/Error"},
          "401": {"$ref": "#/components/responses/Error"},
          "403": {"$ref": "#/components/responses/Error"},
          "409": {"$ref": "#/components/responses/Error"},
          "422": {"$ref": "#/components/responses/SessionCommandRejected"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/sessions/{session_id}/projection": {
      "get": {
        "operationId": "getSessionProjection",
        "parameters": [{"$ref": "#/components/parameters/SessionId"}],
        "responses": {
          "200": {"$ref": "#/components/responses/SessionProjection"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/sessions/{session_id}/catalog": {
      "get": {
        "operationId": "getSessionCatalog",
        "parameters": [{"$ref": "#/components/parameters/SessionId"}],
        "responses": {
          "200": {
            "description": "Source-hashed static rules catalog.",
            "content": {"application/json": {"schema": {"$ref": "./schemas/rules-catalog.schema.json"}}}
          },
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/sessions/{session_id}/events": {
      "get": {
        "operationId": "getSessionEvents",
        "parameters": [
          {"$ref": "#/components/parameters/SessionId"},
          {"$ref": "#/components/parameters/EventCursor"},
          {"$ref": "#/components/parameters/EventPageLimit"}
        ],
        "responses": {
          "200": {"$ref": "#/components/responses/EventDelta"},
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    },
    "/sessions/{session_id}/replay": {
      "get": {
        "operationId": "exportSessionReplay",
        "parameters": [{"$ref": "#/components/parameters/SessionId"}],
        "responses": {
          "200": {
            "description": "Deterministic replay artifact for an administrator, or for a replay viewer after the session is terminal or closed.",
            "content": {"application/json": {"schema": {"$ref": "./schemas/replay-metadata.schema.json"}}}
          },
          "default": {"$ref": "#/components/responses/Error"}
        }
      }
    }
  },
  "components": {
    "securitySchemes": {
      "bearerAuth": {"type": "http", "scheme": "bearer", "bearerFormat": "opaque"}
    },
    "parameters": {
      "EventCursor": {
        "name": "cursor",
        "in": "query",
        "required": true,
        "description": "Opaque server-side cursor identifier bound to the session, authenticated principal, authorization epoch, visibility scope, protected authoritative log offset, viewer sequence, revision, and projection hash.",
        "schema": {"type": "string", "minLength": 1, "maxLength": 2048}
      },
      "EventPageLimit": {
        "name": "limit",
        "in": "query",
        "required": false,
        "schema": {"type": "integer", "minimum": 1, "maximum": 500, "default": 100}
      },
      "GameId": {
        "name": "game_id",
        "in": "path",
        "required": true,
        "schema": {"type": "string", "minLength": 1}
      },
      "RequestId": {
        "name": "request_id",
        "in": "path",
        "required": true,
        "schema": {"type": "string", "minLength": 1}
      },
      "SessionId": {
        "name": "session_id",
        "in": "path",
        "required": true,
        "schema": {"type": "string", "minLength": 1}
      }
    },
    "responses": {
      "Error": {
        "description": "Typed error with shared authentication/authorization redaction shape.",
        "content": {"application/json": {"schema": {"$ref": "./schemas/error-envelope.schema.json"}}}
      },
      "EventDelta": {
        "description": "Role-bound deterministic page or typed projection-resync response.",
        "content": {"application/json": {"schema": {"$ref": "./schemas/event-delta.schema.json"}}}
      },
      "LifecycleStatus": {
        "description": "Role-scoped lifecycle status.",
        "content": {"application/json": {"schema": {"$ref": "./schemas/lifecycle-status.schema.json"}}}
      },
      "SessionCommandOutcome": {
        "description": "Idempotent authenticated command outcome.",
        "content": {"application/json": {"schema": {"$ref": "./schemas/session-command-outcome.schema.json"}}}
      },
      "SessionCommandRejected": {
        "description": "Recorded invalid/unsupported outcome or typed pre-commit rejection.",
        "content": {
          "application/json": {
            "schema": {
              "oneOf": [
                {"$ref": "./schemas/session-command-outcome.schema.json"},
                {"$ref": "./schemas/error-envelope.schema.json"}
              ]
            }
          }
        }
      },
      "SessionMetadata": {
        "description": "Role-scoped session metadata and opaque reconnect checkpoint.",
        "content": {"application/json": {"schema": {"$ref": "./schemas/session-metadata.schema.json"}}}
      },
      "SessionProjection": {
        "description": "Full role-scoped projection with replacement hash and resume cursor.",
        "content": {"application/json": {"schema": {"$ref": "./schemas/session-projection.schema.json"}}}
      }
    },
    "schemas": {
      "AnnotatedDecisionRequest": {"$ref": "./schemas/annotated-decision-request.schema.json"},
      "CreateSession": {"$ref": "./schemas/create-session.schema.json"},
      "DecisionRequestView": {"$ref": "./schemas/decision-request-view.schema.json"},
      "ErrorEnvelope": {"$ref": "./schemas/error-envelope.schema.json"},
      "EventDelta": {"$ref": "./schemas/event-delta.schema.json"},
      "FiniteSubmission": {"$ref": "./schemas/finite-submission.schema.json"},
      "GameView": {"$ref": "./schemas/game-view.schema.json"},
      "InteractionDescriptor": {"$ref": "./schemas/interaction-descriptor.schema.json"},
      "InteractionConformance": {"$ref": "./schemas/interaction-conformance.schema.json"},
      "LifecycleStatus": {"$ref": "./schemas/lifecycle-status.schema.json"},
      "ParameterizedSubmission": {"$ref": "./schemas/parameterized-submission.schema.json"},
      "ProposalPayload": {"$ref": "./schemas/proposal-payload.schema.json"},
      "ReplayMetadata": {"$ref": "./schemas/replay-metadata.schema.json"},
      "RulesCatalog": {"$ref": "./schemas/rules-catalog.schema.json"},
      "SessionCommandEnvelope": {"$ref": "./schemas/session-command-envelope.schema.json"},
      "SessionCommandOutcome": {"$ref": "./schemas/session-command-outcome.schema.json"},
      "SessionCommandResult": {"$ref": "./schemas/session-command-result.schema.json"},
      "SessionCreate": {"$ref": "./schemas/session-create.schema.json"},
      "SessionMetadata": {"$ref": "./schemas/session-metadata.schema.json"},
      "SessionProjection": {"$ref": "./schemas/session-projection.schema.json"},
      "SupportProfile": {"$ref": "./schemas/support-profile.schema.json"}
    }
  }
}
